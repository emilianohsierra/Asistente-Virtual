<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente de Soporte con IA · Emiliano H. Sierra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <!-- Botón de modo oscuro (esquina superior derecha) -->
  <button id="btnTema" class="btn-tema" onclick="cambiarTema()" title="Cambiar tema">🌙</button>

  <header class="encabezado">
    <span class="logo-icon">🤖</span>
    <h1>Asistente de Soporte con IA</h1>
    <p class="subtitulo">Genera respuestas profesionales para tus clientes en segundos.</p>
  </header>

  <main class="contenedor">

    <!-- Formulario -->
    <div class="tarjeta">
      <label for="mensajeCliente">Mensaje del cliente</label>
      <textarea id="mensajeCliente" rows="5" placeholder="Pega aquí el mensaje del cliente..."></textarea>

      <div class="opciones">
        <div class="campo">
          <label for="idioma">Idioma</label>
          <select id="idioma">
            <option value="es">Español</option>
            <option value="en">Inglés</option>
          </select>
        </div>
        <div class="campo">
          <label for="tono">Tono</label>
          <select id="tono">
            <option value="Formal">Formal</option>
            <option value="Amigable">Amigable</option>
            <option value="Empático">Empático</option>
            <option value="Directo y conciso">Directo</option>
          </select>
        </div>
      </div>

      <div class="botones-form">
        <button id="btnGenerar" class="btn-primario" onclick="generarRespuesta()">Generar respuesta</button>
        <button class="btn-secundario" onclick="limpiar()">Limpiar</button>
      </div>
    </div>

    <!-- Resultado (oculto hasta que haya respuesta) -->
    <div id="tarjetaResultado" class="tarjeta resultado-card oculto">
      <div class="resultado-head">
        <span class="resultado-titulo">✨ Respuesta generada</span>
        <div class="resultado-acciones">
          <button id="btnCopiar" class="btn-mini" onclick="copiarRespuesta()">📋 Copiar</button>
          <button class="btn-mini" onclick="generarRespuesta()">🔄 Regenerar</button>
        </div>
      </div>
      <p id="respuesta" class="respuesta"></p>
    </div>

  </main>

  <footer class="pie">
    <p>Proyecto de Emiliano H. Sierra · <a href="https://emilianohsierra.netlify.app" target="_blank">Volver al portafolio</a></p>
  </footer>

  <script>
    async function generarRespuesta() {
      var mensaje = document.getElementById("mensajeCliente").value.trim();
      var idioma = document.getElementById("idioma").value;
      var tono = document.getElementById("tono").value;
      var caja = document.getElementById("respuesta");
      var tarjeta = document.getElementById("tarjetaResultado");
      var boton = document.getElementById("btnGenerar");

      tarjeta.classList.remove("oculto");

      if (mensaje === "") {
        caja.textContent = "⚠️ Primero pega el mensaje del cliente.";
        return;
      }

      // Estado "cargando": desactiva el botón y muestra un spinner
      boton.disabled = true;
      boton.textContent = "⏳ Generando...";
      caja.innerHTML = '<span class="cargando"></span> Escribiendo respuesta...';

      try {
        var res = await fetch("/.netlify/functions/generar-respuesta", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ mensaje: mensaje, idioma: idioma, tono: tono })
        });
        var data = await res.json();
        caja.textContent = data.respuesta;
      } catch (error) {
        caja.textContent = "❌ Hubo un error de conexión. Intenta de nuevo.";
      } finally {
        boton.disabled = false;
        boton.textContent = "Generar respuesta";
      }
    }

    function copiarRespuesta() {
      var texto = document.getElementById("respuesta").textContent;
      var btn = document.getElementById("btnCopiar");
      navigator.clipboard.writeText(texto).then(function () {
        btn.textContent = "✅ ¡Copiado!";
        setTimeout(function () { btn.textContent = "📋 Copiar"; }, 1500);
      });
    }

    function limpiar() {
      document.getElementById("mensajeCliente").value = "";
      document.getElementById("respuesta").textContent = "";
      document.getElementById("tarjetaResultado").classList.add("oculto");
    }

    // ===== Modo oscuro =====
    function cambiarTema() {
      document.body.classList.toggle("tema-oscuro");
      var oscuro = document.body.classList.contains("tema-oscuro");
      document.getElementById("btnTema").textContent = oscuro ? "☀️" : "🌙";
      // Recuerda la preferencia para la próxima visita
      localStorage.setItem("tema", oscuro ? "oscuro" : "claro");
    }

    // Al cargar, aplica el tema que el usuario haya elegido antes
    if (localStorage.getItem("tema") === "oscuro") {
      document.body.classList.add("tema-oscuro");
      document.getElementById("btnTema").textContent = "☀️";
    }
  </script>

</body>
</html>
